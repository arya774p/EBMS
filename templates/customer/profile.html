{% extends "base.html" %}

{% block title %}Profile | EBMS{% endblock %}

{% block content %}
<div class="grid gap-6 lg:grid-cols-[0.7fr_1fr]">
    <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Profile</h1>
        <dl class="mt-6 space-y-4 text-sm">
            <div>
                <dt class="font-medium text-slate-500">Account number</dt>
                <dd class="mt-1 font-semibold text-slate-950">{{ customer.account_no }}</dd>
            </div>
            <div>
                <dt class="font-medium text-slate-500">Email</dt>
                <dd class="mt-1 font-semibold text-slate-950">{{ current_user.email }}</dd>
            </div>
            <div>
                <dt class="font-medium text-slate-500">Created</dt>
                <dd class="mt-1 text-slate-700">{{ customer.created_at }}</dd>
            </div>
        </dl>
    </section>

    <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h2 class="text-lg font-semibold text-slate-950">Update details</h2>
        <form method="POST" class="mt-5 grid gap-4 sm:grid-cols-2">
            <div>
                <label class="text-sm font-medium text-slate-700">Full name</label>
                <input name="full_name" value="{{ customer.full_name }}" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
            <div>
                <label class="text-sm font-medium text-slate-700">Phone</label>
                <input name="phone" value="{{ customer.phone }}" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
            <div class="sm:col-span-2">
                <button class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">Save profile</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
