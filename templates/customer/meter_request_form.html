{% extends "base.html" %}

{% block title %}New Meter Request | EBMS{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-950">Request a meter</h1>
    <form method="POST" class="mt-5 space-y-4">
        <div>
            <label class="text-sm font-medium text-slate-700">Address</label>
            <select name="address_id" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                {% for address in addresses %}
                    <option value="{{ address.id }}">{{ address.display_line }}</option>
                {% endfor %}
            </select>
            {% if not addresses %}
                <p class="mt-2 text-sm text-rose-700">Add an address before requesting a meter.</p>
            {% endif %}
        </div>
        <div class="grid gap-4 sm:grid-cols-3">
            <div>
                <label class="text-sm font-medium text-slate-700">Category</label>
                <select name="category" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                    <option value="DOMESTIC">DOMESTIC</option>
                    <option value="COMMERCIAL">COMMERCIAL</option>
                </select>
            </div>
            <div>
                <label class="text-sm font-medium text-slate-700">Sanction load</label>
                <input name="sanction_load" type="number" min="0.01" step="0.01" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
            <div>
                <label class="text-sm font-medium text-slate-700">Max demand</label>
                <input name="max_demand" type="number" min="0" step="0.01" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
        </div>
        <div class="flex gap-3">
            <button class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700" {% if not addresses %}disabled{% endif %}>Submit request</button>
            <a href="{{ url_for('customer_meter_requests') }}" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
