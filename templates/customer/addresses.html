{% extends "base.html" %}

{% block title %}Addresses | EBMS{% endblock %}

{% block content %}
<div class="grid gap-6 lg:grid-cols-[0.85fr_1.15fr]">
    <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-950">Add address</h1>
        <form method="POST" class="mt-5 space-y-4">
            <div>
                <label class="text-sm font-medium text-slate-700">Base address</label>
                <input name="base_address" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
            <div>
                <label class="text-sm font-medium text-slate-700">Locality</label>
                <input name="locality" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
            <div class="grid gap-4 sm:grid-cols-3">
                <div>
                    <label class="text-sm font-medium text-slate-700">City</label>
                    <input name="city" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-700">State</label>
                    <input name="state" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-700">Pincode</label>
                    <input name="pincode" maxlength="6" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                </div>
            </div>
            <button class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700">Add address</button>
        </form>
    </section>

    <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
        <div class="border-b border-slate-200 px-5 py-4">
            <h2 class="text-lg font-semibold text-slate-950">Saved addresses</h2>
        </div>
        <div class="divide-y divide-slate-100">
            {% for address in addresses %}
                <div class="px-5 py-4">
                    <p class="font-medium text-slate-950">{{ address.base_address }}</p>
                    <p class="mt-1 text-sm text-slate-600">{{ address.display_line }}</p>
                    <div class="mt-3 flex gap-2">
                        <a href="{{ url_for('edit_customer_address', address_id=address.id) }}" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Edit</a>
                        <form method="POST" action="{{ url_for('delete_customer_address', address_id=address.id) }}">
                            <button class="rounded-lg border border-rose-200 px-3 py-1.5 text-sm font-medium text-rose-700 hover:bg-rose-50">Delete</button>
                        </form>
                    </div>
                </div>
            {% else %}
                <p class="px-5 py-8 text-center text-sm text-slate-500">No addresses added yet.</p>
            {% endfor %}
        </div>
    </section>
</div>
{% endblock %}
