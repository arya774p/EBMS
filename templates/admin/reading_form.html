{% extends "base.html" %}

{% block title %}Add Reading | EBMS{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-950">Add meter reading</h1>
    <form method="POST" class="mt-5 space-y-4">
        <div>
            <label class="text-sm font-medium text-slate-700">Meter</label>
            <select name="meter_id" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                {% for meter in meters %}
                    <option value="{{ meter.id }}">{{ meter.meter_no }} - {{ meter.customer.full_name }} ({{ meter.status }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="grid gap-4 sm:grid-cols-3">
            <div>
                <label class="text-sm font-medium text-slate-700">Reading date</label>
                <input type="date" name="reading_date" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
            <div>
                <label class="text-sm font-medium text-slate-700">Reading value</label>
                <input type="number" name="reading_value" min="0" step="0.01" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
            </div>
            <div>
                <label class="text-sm font-medium text-slate-700">Type</label>
                <select name="reading_type" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                    <option value="ACTUAL">ACTUAL</option>
                    <option value="ESTIMATED">ESTIMATED</option>
                </select>
            </div>
        </div>
        <button class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700">Save reading</button>
    </form>
</div>
{% endblock %}
