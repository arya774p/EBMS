{% extends "base.html" %}

{% block title %}Signup | EBMS{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-950">Customer Signup</h1>
    <p class="mt-2 text-sm text-slate-600">An account number is generated automatically after successful registration.</p>

    <form method="POST" class="mt-6 grid gap-4 sm:grid-cols-2">
        <div class="sm:col-span-2">
            <label class="text-sm font-medium text-slate-700">Full name</label>
            <input type="text" name="full_name" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
        </div>
        <div>
            <label class="text-sm font-medium text-slate-700">Phone</label>
            <input type="text" name="phone" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
        </div>
        <div>
            <label class="text-sm font-medium text-slate-700">Email</label>
            <input type="email" name="email" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
        </div>
        <div class="sm:col-span-2">
            <label class="text-sm font-medium text-slate-700">Password</label>
            <input type="password" name="password" minlength="6" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
        </div>
        <div class="sm:col-span-2">
            <button type="submit" class="w-full rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700">Create account</button>
        </div>
    </form>

    <p class="mt-5 text-sm text-slate-600">Already registered? <a href="{{ url_for('login') }}" class="font-semibold text-emerald-700 hover:text-emerald-800">Login</a></p>
</div>
{% endblock %}
