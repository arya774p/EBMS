{% extends "base.html" %}

{% block title %}Login | EBMS{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-950">Login</h1>
    <p class="mt-2 text-sm text-slate-600">Use your customer or admin account.</p>

    <form method="POST" class="mt-6 space-y-4">
        <div>
            <label class="text-sm font-medium text-slate-700">Email</label>
            <input type="email" name="email" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
        </div>
        <div>
            <label class="text-sm font-medium text-slate-700">Password</label>
            <input type="password" name="password" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
        </div>
        <button type="submit" class="w-full rounded-lg bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-800">Login</button>
    </form>

    <p class="mt-5 text-sm text-slate-600">New customer? <a href="{{ url_for('signup') }}" class="font-semibold text-emerald-700 hover:text-emerald-800">Create an account</a></p>
</div>
{% endblock %}
